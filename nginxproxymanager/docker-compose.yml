networks:
  npm_network:
    external: false

services:
  app:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    networks:
      - npm_network
    ports:
      - "${NPM_IP}:80:80"
      - "${NPM_IP}:443:443"
      - "${NPM_IP}:81:81"
    environment:
      TZ: "${TZ}"
      DB_POSTGRES_HOST: "db"
      DB_POSTGRES_PORT: 5432
      DB_POSTGRES_USER: "${POSTGRES_USER}"
      DB_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      DB_POSTGRES_NAME: "${POSTGRES_DB}"
      DISABLE_IPV6: "true"
      INITIAL_ADMIN_EMAIL: "${INITIAL_ADMIN_EMAIL}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD}"
    volumes:
      - "${NPM_DATA_PATH}:/data"
      - "${NPM_LETSENCRYPT_PATH}:/etc/letsencrypt"
      - "${NPM_GEOIP_PATH}:/geoip"
    depends_on:
      - db
      - geoip-updater
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: postgres:17
    container_name: postgres-npm
    restart: unless-stopped
    networks:
      - npm_network
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - "${NPM_POSTGRES_PATH}:/var/lib/postgresql/data"

  geoip-updater:
    image: curlimages/curl:latest
    container_name: geoip-updater
    restart: "no"
    networks:
      - npm_network
    volumes:
      - "${NPM_GEOIP_PATH}:/geoip"
    environment:
      MAXMIND_ACCOUNT_ID: "${MAXMIND_ACCOUNT_ID}"
      MAXMIND_LICENSE_KEY: "${MAXMIND_LICENSE_KEY}"
    command: >
      sh -c "
      echo 'Downloading GeoLite2-Country database...' &&
      curl -sSL -u ${MAXMIND_ACCOUNT_ID}:${MAXMIND_LICENSE_KEY} 'https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?license_key='${MAXMIND_LICENSE_KEY}'&suffix=tar.gz' -o /geoip/GeoLite2-Country.tar.gz &&
      tar -xzf /geoip/GeoLite2-Country.tar.gz -C /geoip --strip-components=1 &&
      rm /geoip/GeoLite2-Country.tar.gz &&
      echo 'GeoLite2-Country.mmdb ready in /geoip'
      "
